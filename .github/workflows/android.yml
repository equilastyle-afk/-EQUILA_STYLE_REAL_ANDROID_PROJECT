name: Build EQUILA STYLE APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: echo "APK Build Ready"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EQUILA-STYLE-APK
          path: .
